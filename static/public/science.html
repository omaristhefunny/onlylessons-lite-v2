<iframe id="game-frame" src="history.html" allowtransparency="true"></iframe>
<script>
const urlParams = new URLSearchParams(window.location.search);
const embedUrl = urlParams.get('embed');
if (embedUrl) {
  // Append the parent's hash to the iframe src (for embed.html#url pattern)
  const hash = window.location.hash;
  document.getElementById('game-frame').src = embedUrl + hash;
}

let particlesEnabled = true;
function initParticles() {
  if (!particlesEnabled) return;
  particlesJS("particles-js", {
  "particles": {
    "number": {
      "value": 150,
      "density": { "enable": true, "value_area": 900 }
    },
    "color": { "value": "#ffffff" },
    "shape": {
      "type": "circle"
    },
    "opacity": {
      "value": 0.8,
      "random": true
    },
    "size": {
      "value": 3,
      "random": true
    },
    "move": {
      "direction": "bottom",
      "speed": 1.2,
      "random": true,
      "straight": false,
      "out_mode": "out",
      "bounce": false
    },
    "line_linked": { "enable": false }
  },
  "interactivity": {
    "events": {
      "onhover": { "enable": false },
      "onclick": { "enable": false }
    }
  },
  "retina_detect": true
});

}
initParticles();


const toggleBtn = document.getElementById("toggle-sidebar");
if (toggleBtn) {
  toggleBtn.addEventListener("click", () => {
    const sidebar = document.getElementById("sidebar");
    const iframe = document.getElementById("game-frame");

    if (sidebar.classList.contains("hidden")) {
      sidebar.classList.remove("hidden");
      iframe.style.left = "220px";
      iframe.style.width = "calc(100% - 220px)";
      toggleBtn.textContent = "Hide Sidebar";
    } else {
    sidebar.classList.add("hidden");
    iframe.style.left = "0";
    iframe.style.width = "100%";
    toggleBtn.textContent = "Show Sidebar";
  }
  });
}

window.addEventListener("message", (e) => {
  if (e.data.type === "uiToggle") {
    const sidebar = document.getElementById('sidebar');
    const iframe = document.getElementById("game-frame");

    if (e.data.hideSidebar) {
      sidebar.classList.add('hidden');
      iframe.style.left = "0"; 
      iframe.style.width = "100%"; 
    } else {
      sidebar.classList.remove('hidden');
      iframe.style.left = "220px";
      iframe.style.width = "calc(100% - 220px)";
    }

    if (e.data.disableParticles) {
      particlesEnabled = false;
      document.getElementById("particles-js").style.display = "none";
    } else {
      particlesEnabled = true;
      document.getElementById("particles-js").style.display = "block";
      initParticles();
    }
  }
});
</script>
