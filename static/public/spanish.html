  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #000;
      color: #87CEEB;
      min-height: 100vh;
      overflow-x: auto;
    }

    canvas#particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
    }

    .container {
      padding: 100px 40px 40px;
      max-width: 1400px;
      margin: 0 auto !important;
      position: relative;
      z-index: 1;
      margin-left: auto !important;
      margin-right: auto !important;
    }

    .page-header {
      text-align: center;
      margin-bottom: 50px;
    }

    .page-title {
      font-size: 3rem;
      font-weight: 700;
      color: #87CEEB;
      margin-bottom: 35px;
      letter-spacing: -1px;
    }

    /* Search Bar */
    .search-container {
      max-width: 600px;
      margin: 0 auto 35px !important;
      position: relative;
      margin-left: auto !important;
      margin-right: auto !important;
    }

    .search-bar {
      display: flex;
      align-items: center;
      background: rgba(135, 206, 235, 0.03);
      border: 1px solid rgba(135, 206, 235, 0.1);
      border-radius: 50px;
      padding: 14px 28px;
      gap: 14px;
      transition: all 0.3s ease;
    }

    .search-bar:focus-within {
      border-color: rgba(135, 206, 235, 0.4);
      box-shadow: 0 0 30px rgba(135, 206, 235, 0.1);
      background: rgba(135, 206, 235, 0.05);
      transform: scale(1.02);
    }

    .search-bar svg {
      width: 22px;
      height: 22px;
      color: rgba(135, 206, 235, 0.5);
      flex-shrink: 0;
    }

    .search-input {
      flex: 1;
      background: transparent;
      border: none;
      color: #87CEEB;
      font-size: 16px;
      font-family: inherit;
      outline: none;
    }

    .search-input::placeholder {
      color: rgba(135, 206, 235, 0.35);
    }

    .search-hint {
      font-size: 11px;
      color: rgba(135, 206, 235, 0.5);
      background: rgba(135, 206, 235, 0.08);
      padding: 5px 12px;
      border-radius: 20px;
    }

    /* Category Tabs */
    .category-tabs {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 40px;
      flex-wrap: wrap;
    }

    .category-tab {
      padding: 12px 28px;
      background: rgba(135, 206, 235, 0.02);
      border: 1px solid rgba(135, 206, 235, 0.1);
      border-radius: 30px;
      color: rgba(135, 206, 235, 0.6);
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 14px;
      font-weight: 500;
    }

    .category-tab:hover {
      background: rgba(135, 206, 235, 0.08);
      border-color: rgba(135, 206, 235, 0.2);
      transform: translateY(-2px);
    }

    .category-tab.active {
      background: rgba(135, 206, 235, 0.1);
      border-color: rgba(135, 206, 235, 0.3);
      color: #87CEEB;
    }

    /* Apps Grid */
    .apps-section {
      margin-bottom: 50px;
    }

    .section-title {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 25px;
      padding-bottom: 15px;
      border-bottom: 1px solid rgba(135, 206, 235, 0.1);
      color: rgba(135, 206, 235, 0.9);
    }

    .apps-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 20px;
      justify-content: center;
    }

    .app-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-decoration: none;
      padding: 24px 16px;
      border-radius: 20px;
      background: rgba(135, 206, 235, 0.02);
      border: 1px solid rgba(135, 206, 235, 0.08);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .app-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, rgba(135, 206, 235, 0.1) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .app-card:hover {
      transform: translateY(-8px) scale(1.05);
      border-color: rgba(135, 206, 235, 0.25);
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4), 0 0 20px rgba(135, 206, 235, 0.1);
      background: rgba(135, 206, 235, 0.05);
    }

    .app-card:hover::before {
      opacity: 1;
    }

    .app-card img {
      width: 72px;
      height: 72px;
      border-radius: 18px;
      object-fit: cover;
      border: 2px solid rgba(135, 206, 235, 0.15);
      margin-bottom: 14px;
      transition: all 0.3s ease;
    }

    .app-card:hover img {
      border-color: rgba(135, 206, 235, 0.4);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
      transform: scale(1.1) rotate(3deg);
    }

    .app-card span {
      color: rgba(135, 206, 235, 0.85);
      font-weight: 600;
      font-size: 0.9rem;
      text-align: center;
      transition: all 0.3s ease;
    }

    .app-card:hover span {
      color: #87CEEB;
      transform: scale(1.05);
    }

    .app-card.hidden {
      display: none;
    }

    /* Add App Button */
    .add-app-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      border-radius: 20px;
      background: rgba(135, 206, 235, 0.02);
      border: 2px dashed rgba(135, 206, 235, 0.15);
      cursor: pointer;
      transition: all 0.3s ease;
      min-height: 140px;
    }

    .add-app-card:hover {
      border-color: rgba(135, 206, 235, 0.4);
      background: rgba(135, 206, 235, 0.05);
      transform: translateY(-8px) scale(1.05);
      border-style: solid;
    }

    .add-app-card .plus-icon {
      font-size: 2.5rem;
      color: rgba(135, 206, 235, 0.4);
      margin-bottom: 10px;
      transition: all 0.3s ease;
    }

    .add-app-card:hover .plus-icon {
      color: #87CEEB;
      transform: scale(1.2) rotate(90deg);
    }

    .add-app-card span {
      color: rgba(135, 206, 235, 0.5);
      font-weight: 500;
      font-size: 0.85rem;
      transition: all 0.3s ease;
    }

    .add-app-card:hover span {
      color: #87CEEB;
    }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      backdrop-filter: blur(10px);
    }

    .modal-overlay.show {
      display: flex;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .modal {
      background: rgba(10, 10, 10, 0.98);
      border: 1px solid rgba(135, 206, 235, 0.15);
      border-radius: 24px;
      padding: 36px;
      width: 90%;
      max-width: 420px;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6);
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .modal h3 {
      color: #87CEEB;
      font-size: 1.5rem;
      margin-bottom: 28px;
      text-align: center;
      font-weight: 600;
    }

    .modal input {
      width: 100%;
      padding: 16px 20px;
      margin-bottom: 16px;
      border: 1px solid rgba(135, 206, 235, 0.1);
      border-radius: 14px;
      background: rgba(135, 206, 235, 0.03);
      color: #87CEEB;
      font-family: inherit;
      font-size: 15px;
      outline: none;
      transition: all 0.3s ease;
    }

    .modal input:focus {
      border-color: rgba(135, 206, 235, 0.4);
      background: rgba(135, 206, 235, 0.05);
      box-shadow: 0 0 0 3px rgba(135, 206, 235, 0.1);
    }

    .modal input::placeholder {
      color: rgba(135, 206, 235, 0.4);
    }

    .modal-buttons {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }

    .modal button {
      flex: 1;
      padding: 14px;
      border-radius: 12px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .modal .save-btn {

      border: 1px solid rgba(135, 206, 235, 0.3);
      color: #87CEEB;
    }

    .modal .save-btn:hover {

      border-color: rgba(135, 206, 235, 0.4);
    }

    .modal .cancel-btn {
      background: transparent;
      border: 1px solid rgba(135, 206, 235, 0.15);
      color: rgba(135, 206, 235, 0.7);
    }

    .modal .cancel-btn:hover {
      border-color: rgba(135, 206, 235, 0.3);

    }

    /* Scrollbar */

    ::-webkit-scrollbar-thumb { background: rgba(135, 206, 235, 0.2); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(135, 206, 235, 0.3); }
  </style>

  <script>
    // Search functionality
    const searchInput = document.getElementById('searchInput');
    const appCards = document.querySelectorAll('.app-card');
    const categoryTabs = document.querySelectorAll('.category-tab');
    const noResults = document.getElementById('noResults');

    let currentCategory = 'all';

    function filterApps() {
      const searchTerm = searchInput.value.toLowerCase();
      let visibleCount = 0;

      appCards.forEach(card => {
        const name = card.querySelector('span').textContent.toLowerCase();
        const category = card.dataset.category;
        
        const matchesSearch = name.includes(searchTerm);
        const matchesCategory = currentCategory === 'all' || category === currentCategory;
        
        if (matchesSearch && matchesCategory) {
          card.classList.remove('hidden');
          visibleCount++;
        } else {
          card.classList.add('hidden');
        }
      });

      noResults.classList.toggle('visible', visibleCount === 0);
    }

    searchInput.addEventListener('input', filterApps);

    // Category tabs
    categoryTabs.forEach(tab => {
      tab.addEventListener('click', () => {
        categoryTabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentCategory = tab.dataset.category;
        filterApps();
      });
    });

    // Ctrl+K to focus search
    document.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
        e.preventDefault();
        searchInput.focus();
      }
    });

    // Snowflake animation
    const canvas = document.getElementById("particles");
    const ctx = canvas.getContext("2d");

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();

    let snowflakes = [];

    class Snowflake {
      constructor() {
        this.reset();
      }

      reset() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * -canvas.height;
        this.size = Math.random() * 3 + 1;
        this.speedY = Math.random() * 2 + 0.5;
        this.speedX = Math.random() * 1 - 0.5;
        this.opacity = Math.random() * 0.7 + 0.3;
      }

      update() {
        this.x += this.speedX + Math.sin(this.y * 0.01) * 0.3;
        this.y += this.speedY;

        if (this.y > canvas.height) {
          this.reset();
          this.y = -10;
        }
      }

      draw() {
        ctx.fillStyle = `rgba(135, 206, 235, ${this.opacity})`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function initSnow() {
      snowflakes = [];
      for (let i = 0; i < 150; i++) {
        snowflakes.push(new Snowflake());
      }
    }

    function animateSnow() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      snowflakes.forEach(flake => {
        flake.update();
        flake.draw();
      });
      requestAnimationFrame(animateSnow);
    }

    window.addEventListener("resize", () => {
      resizeCanvas();
      initSnow();
    });

    initSnow();
    animateSnow();
  </script>

  <!-- Add App Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h3>Add Custom App</h3>
      <input type="text" id="appTitle" placeholder="App Name" required>
      <input type="url" id="appUrl" placeholder="URL (e.g., https://example.com)" required>
      <input type="url" id="appImage" placeholder="Image URL (optional)">
      <div class="modal-buttons">
        <button class="cancel-btn" onclick="closeModal()">Cancel</button>
        <button class="save-btn" onclick="saveCustomApp()">Add App</button>
      </div>
    </div>
  </div>

  <script>
    // Custom apps management
    const CUSTOM_APPS_KEY = 'onlylessons_custom_apps';

    function getCustomApps() {
      const apps = localStorage.getItem(CUSTOM_APPS_KEY);
      return apps ? JSON.parse(apps) : [];
    }

    function saveCustomApps(apps) {
      localStorage.setItem(CUSTOM_APPS_KEY, JSON.stringify(apps));
    }

    function renderCustomApps() {
      const customApps = getCustomApps();
      const grid = document.getElementById('appsGrid');
      
      // Remove existing custom app elements
      document.querySelectorAll('.custom-app').forEach(el => el.remove());
      
      // Add custom apps before the add button
      const addButton = document.querySelector('.add-app-card');
      
      customApps.forEach((app, index) => {
        const card = document.createElement('a');
        card.href = '/g?embed=embed.html#' + app.url;
        card.className = 'app-card custom-app';
        card.dataset.category = 'custom';
        
        const appTitle = app.title || '?';
        const imgUrl = app.image || 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 80 80"><rect fill="#1a1a1a" width="80" height="80" rx="16"/><text x="40" y="50" text-anchor="middle" fill="#87CEEB" font-size="30">'+appTitle.charAt(0)+'</text></svg>');
        
        card.innerHTML = `
          <img src="${imgUrl}" alt="${appTitle}">
          <span>${appTitle}</span>
          <button class="delete-app" onclick="deleteCustomApp(event, ${index})">×</button>
        `;
        
        grid.insertBefore(card, addButton.nextSibling);
      });
    }

    function openModal() {
      document.getElementById('modalOverlay').classList.add('show');
      document.getElementById('appTitle').focus();
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('show');
      document.getElementById('appTitle').value = '';
      document.getElementById('appUrl').value = '';
      document.getElementById('appImage').value = '';
    }

    function saveCustomApp() {
      const title = document.getElementById('appTitle').value.trim();
      let url = document.getElementById('appUrl').value.trim();
      const image = document.getElementById('appImage').value.trim();
      
      if (!title || !url) {
        alert('Please fill in the app name and URL');
        return;
      }
      
      // Add https if missing
      if (!url.startsWith('http://') && !url.startsWith('https://')) {
        url = 'https://' + url;
      }
      
      const customApps = getCustomApps();
      customApps.push({ title, url, image });
      saveCustomApps(customApps);
      
      renderCustomApps();
      closeModal();
    }

    function deleteCustomApp(event, index) {
      event.preventDefault();
      event.stopPropagation();
      
      if (confirm('Remove this app?')) {
        const customApps = getCustomApps();
        customApps.splice(index, 1);
        saveCustomApps(customApps);
        renderCustomApps();
      }
    }

    // Close modal on outside click
    document.getElementById('modalOverlay').addEventListener('click', function(e) {
      if (e.target === this) {
        closeModal();
      }
    });

    // Render custom apps on load
    setTimeout(renderCustomApps, 0);

    // Add "custom" category to tabs
    const categoryTabsContainer = document.querySelector('.category-tabs');
    const customTab = document.createElement('button');
    customTab.className = 'category-tab';
    customTab.dataset.category = 'custom';
    customTab.textContent = 'Custom';
    categoryTabsContainer.appendChild(customTab);

    // Update filter function to handle custom apps
    const originalFilterApps = filterApps;
    filterApps = function() {
      const searchTerm = document.getElementById('searchInput').value.toLowerCase();
      const appCards = document.querySelectorAll('.app-card');
      let visibleCount = 0;

      appCards.forEach(card => {
        const name = card.querySelector('span')?.textContent.toLowerCase() || '';
        const category = card.dataset.category;
        
        const matchesSearch = name.includes(searchTerm);
        const matchesCategory = currentCategory === 'all' || category === currentCategory;
        
        if (matchesSearch && matchesCategory) {
          card.classList.remove('hidden');
          visibleCount++;
        } else {
          card.classList.add('hidden');
        }
      });

      noResults.classList.toggle('visible', visibleCount === 0);
    };
  </script>
