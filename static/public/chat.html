<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link id="favicon" rel="icon" href="images/nreds.png" type="image/x-icon">
  <title>IXL | Math, Language Arts, Science, Social Studies, and Spanish</title>
  <link rel="stylesheet" href="css/stylesbeta.css">
  <link rel="stylesheet" href="css/navbar.css">
  <meta name="description"
    content="IXL is the world's most popular subscription-based learning site for K–12. Used by over 17 million students, IXL provides personalized learning in more than 17,000 topics, covering math, language arts, science, social studies, and Spanish. Interactive questions, awards, and certificates keep kids motivated as they master skills." />
  <meta property="og:title" content="IXL | Math, Language Arts, Science, Social Studies, and Spanish" />
  <meta property="og:description"
    content="IXL is the world's most popular subscription-based learning site for K–12. Used by over 17 million students, IXL provides personalized learning in more than 17,000 topics, covering math, language arts, science, social studies, and Spanish. Interactive questions, awards, and certificates keep kids motivated as they master skills." />
  <meta property="og:url" content="https://suntree-net.worksm" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="IXL Learning" />
  <meta property="og:image"
    content="https://www.ixl.com/dv3/powZqMuTE7du4asFrVyNGxxoqkw/yui3/opengraph/assets/general_us.png" />
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3994010637386586"
    crossorigin="anonymous"></script>
  <script src="https://cdn.scaledrone.com/scaledrone.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap');

    body {
      margin: 0;
      overflow: hidden;
      background: #000;
      font-family: 'Quicksand', Arial, sans-serif;
      color: #eee;
    }

    
    .chat {
      max-width: 800px;
      margin: 20px auto;
      font-family: 'Quicksand', Arial, sans-serif;
    }

    .members {
      font-size: 14px;
      margin-bottom: 10px;
      color: #eee;
      font-family: 'Quicksand', Arial, sans-serif;
    }

    .members-list .member {
      margin-right: 6px;
      display: inline-block;
      font-family: 'Quicksand', Arial, sans-serif;
    }

    .messages {
      height: 400px;
      width: 670px;
      overflow-y: auto;
      border: 1px solid #333;
      font-family: 'Quicksand', Arial, sans-serif;
      padding: 10px;
      background: #000000;
      background-color: rgba(0, 0, 0, 0.1);
    }

    .message {
      margin: 6px 0;
      font-family: 'Quicksand', Arial, sans-serif;
    }

    .message-form {
      display: flex;
      margin-top: 10px;
      font-family: 'Quicksand', Arial, sans-serif;
    }

    .message-form__input {
      flex: 1;
      padding: 10px;
      background: #111;
      color: #fff;
      font-family: 'Quicksand', Arial, sans-serif;
      border: 1px solid #333;
      border-radius: 5px;
      outline: none;
    }

     button {
      padding: 10px 20px;
      background-image: linear-gradient(45deg, rgb(255, 102, 0), rgb(0, 0, 0), rgb(255, 153, 0), rgb(0, 0, 0));
      background-size: 400%;
      color: #ffffff;
      font-family: 'Quicksand', Arial, sans-serif;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

     button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 10px rgba(47, 128, 237, 0.5);
      font-family: 'Quicksand', Arial, sans-serif;
    }

    
    #authPanel {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background-color: rgba(0, 0, 0, 0.9);
      font-family: 'Quicksand', Arial, sans-serif;
      border: 2px solid #FF8C00;
      border-radius: 10px;
      padding: 30px;
      box-shadow: 0 0 20px #FF8C00;
      z-index: 100;
      min-width: 300px;
    }

    #authPanel h2, #authPanel h4 {
      color: #FF8C00;
      font-family: 'Quicksand', Arial, sans-serif;
      text-shadow: 0 0 10px #FF8C00;
      margin-bottom: 15px;
    }

    #authPanel input {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      border: 1px solid #444;
      border-radius: 5px;
      font-family: 'Quicksand', Arial, sans-serif;
      background-color: #111;
      color: #fff;
      box-sizing: border-box;
      outline: none;
      transition: border-color 0.3s, background-color 0.3s;
    }

    #authPanel input:focus {
      border-color: #FF8C00;
      font-family: 'Quicksand', Arial, sans-serif;
      background-color: #000;
      box-shadow: 0 0 5px rgba(255, 140, 0, 0.5);
    }

    #authPanel hr {
      border: none;
      border-top: 1px solid #333;
      font-family: 'Quicksand', Arial, sans-serif;
      margin: 20px 0;
    }

    #authMsg {
      color: #FFB347;
      margin-top: 10px;
      font-family: 'Quicksand', Arial, sans-serif;
      text-align: center;
    }
    #logoutButton {
      position: fixed;
      bottom: 30px;
      background-color: rgba(255, 140, 0, 1);
      color: #ffffff;
      padding: 8px 12px;
      font-family: 'Quicksand', Arial, sans-serif;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      z-index: 100;
      display: none;
      position: fixed;
  bottom: 16px;
  left: 16px;
    }
    #logoutButton:hover {
      transform: scale(1.05);
      box-shadow: 0 0 10px rgba(255, 140, 0, 0.5);
      font-family: 'Quicksand', Arial, sans-serif;
    }
    h3 {
      position: fixed;
      left: 0;
      width: 100%;
      text-align: center;
      color: #eee;
      font-family: 'Quicksand', Arial, sans-serif;
      margin: 0;
      padding: 10px;
      background: rgba(0, 0, 0, 0.7);
      z-index: 50;
    }

    
    #particles-js {
      position: fixed;
      width: 100%;
      height: 100%;
      z-index: -1;
    }

    
    .dark-mode-textbox {
      padding: 10px;
      border: 1px solid #444;
      border-radius: 5px;
      font-size: 14px;
      background-color: #333;
      color: #fff;
      outline: none;
      transition: border-color 0.3s, background-color 0.3s;
    }

    .dark-mode-textbox::placeholder {
      color: #999;
    }

    .dark-mode-textbox:focus {
      border-color: #007bff;
      background-color: #111;
      box-shadow: 0 0 5px rgba(0, 123, 255, 0.5);
    }

    .green-text { color: #00fe2f; }
    .red-text { color: #ff0000; }
    .yellow-text { color: rgb(255, 255, 0); }

    
    @keyframes rainbow {
      0% { color: #ff0000; }
      16% { color: #ff7f00; }
      33% { color: #ffff00; }
      50% { color: #00ff00; }
      66% { color: #0000ff; }
      83% { color: #8b00ff; }
      100% { color: #ff0000; }
    }

    .dev-name {
      animation: rainbow 3s linear infinite;
      font-weight: bold;
      text-shadow: 0 0 10px currentColor;
    }

    .dev-crown {
      display: inline-block;
      margin-left: 5px;
      font-size: 1.2em;
      filter: drop-shadow(0 0 5px gold);
    }
  </style>
</head>

<body>
  <div id="particles-js"></div>
  
  <div class="navbar">
    <div class="navbar-left">
      <img src="images/blue girl.gif" alt="Kernel's Logo" class="logo">
      <a href="/" class="active">
        <span class="logo-text">suntree-network</span>
      </a>
    </div>
    <div class="navbar-right">
      <a href="/" class="active">
        <span class="label">Home</span>
      </a>
      <a href="/chat.html">
        <span class="label">Chat</span>
      </a>
      <a href="/g">
        <span class="label">ɢɑᴍᴇѕ</span>
      </a>
      <div class="dropdown">
        <a href="#" class="dropdown-toggle">
          <span class="label">Other ▼</span>
        </a>
        <div class="dropdown-menu">
          <a href="/other/partners.html">Partners</a>
          <a href="/other/privacy.html">Privacy Policy</a>
          <a href="/other/dmca.html">DMCA</a>
        </div>
      </div>
    </div>
  </div>



  
  <div id="authPanel">
    <h2>Login</h2>
    <form id="loginForm">
      <input id="loginUser" placeholder="Username" autocomplete="username" required />
      <input id="loginPass" placeholder="Password" type="password" autocomplete="current-password" required />
      <button type="submit">Login</button>
    </form>

    <hr />

    <h4>New Here?</h4>
    <form id="registerForm">
      <input id="registerUser" placeholder="Username" autocomplete="username" required />
      <input id="registerPass" placeholder="Password" type="password" autocomplete="new-password" required />
      <button type="submit">Register</button>
    </form>

    <p id="authMsg"></p>
  </div>

  <div id="chat" class="chat">
    <div class="members">
      <span class="members-count"></span>
      <div class="members-list"></div>
    </div>
    <div class="messages"></div>
    <form class="message-form">
      <input class="message-form__input" placeholder="Type your message here..." autocomplete="off" />
      <button type="submit">Send</button>
    </form>
  </div>
<button  id="logoutButton">Logout</button>

  <script src="/js/chatsystem.js"></script>

  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="/js/vanta.dots.min.js"></script>
  <script>
    VANTA.DOTS({
      el: "#particles-js",
      mouseControls: true,
      touchControls: true,
      gyroControls: false,
      minHeight: 200.00,
      minWidth: 200.00,
      scale: 3.00,
      scaleMobile: 1.00,
      color: 0xff4800,
      color2: 0x7bff20,
      backgroundColor: 0x0,
      showLines: true
    })
  </script>
</body>

</html>
