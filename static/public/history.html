    <style>
        :root {
            --primary: #87CEEB;
            --primary-hover: #a8dcf0;
            --primary-light: rgba(135, 206, 235, 0.1);
            --primary-glow: rgba(135, 206, 235, 0.3);
            --accent: #87CEEB;
            --text: #87CEEB;
            --text-muted: rgba(135, 206, 235, 0.6);
            --text-light: rgba(135, 206, 235, 0.5);
            --bg: #000;
            --bg-secondary: #0a0a0a;
            --surface: #1a1a1a;
            --surface-hover: #252525;
            --border: #333;
            --border-light: #444;

            --radius: 16px;

            margin: 0;
            padding: 0;

        body {

            color: var(--text);

            -moz-osx-font-smoothing: grayscale;
            position: relative;

        #particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        header, main, #zoneViewer, #popupOverlay {
            position: relative;
            z-index: 10;

        header {
            background: transparent;
            border-bottom: none;
            position: sticky;
            top: 0;

            padding: 20px 0;

        .header-content {

            margin: 0 auto;
            padding: 0 2rem;
            display: flex;

            align-items: center;
            gap: 1rem;
        }

        .page-title {
            font-size: 36px;
            font-weight: 700;
            color: #87CEEB;
            text-align: center;
        }

        .search-container {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            width: 100%;
            max-width: 800px;
            justify-content: center;
        }

        #searchBar {
            flex: 1;
            min-width: 250px;
            padding: 14px 20px;
            border: 2px solid rgba(135, 206, 235, 0.2);
            border-radius: 14px;
            background: rgba(30, 30, 30, 0.95);
            color: #87CEEB;
            font-size: 15px;
            font-weight: 500;
            outline: none;
            transition: all 0.3s ease;

            background: rgba(40, 40, 40, 0.95);
            box-shadow: 0 0 20px rgba(135, 206, 235, 0.15);
        }

        #searchBar::placeholder {

        #sortOptions,
        #filterOptions {
            padding: 14px 20px;
            border: 2px solid rgba(135, 206, 235, 0.2);
            border-radius: 14px;

            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            outline: none;
            transition: all 0.3s ease;
            min-width: 140px;
        }

        #sortOptions:hover,
        #filterOptions:hover {
            border-color: var(--primary);
            background: rgba(135, 206, 235, 0.08);
        }

        #sortOptions option,
        #filterOptions option {
            background: #1a1a1a;
            color: #87CEEB;
        }


        main {
            margin: 0 auto;
            padding: 1rem 2rem 3rem;
            max-width: 1400px;
        }


        #container {
            display: flex;
            flex-direction: column;
        }

        .zone-item {
            background: rgba(135, 206, 235, 0.03);
            border: 2px solid rgba(135, 206, 235, 0.08);
            border-radius: var(--radius);
            overflow: hidden;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .zone-item::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, var(--primary-light) 0%, transparent 100%);
            opacity: 0;
            transition: opacity 0.4s ease;
            pointer-events: none;
            z-index: 1;
            border-radius: var(--radius);
        }

        .zone-item:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: rgba(135, 206, 235, 0.3);
            box-shadow: 0 10px 40px rgba(135, 206, 235, 0.1);
        }

        .zone-item:hover::before {
            opacity: 1;
        }

        .zone-item img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            display: block;
            background: var(--bg-secondary);
            transition: transform 0.4s ease;

        .zone-item:hover img {
            transform: scale(1.08);
        }

        .zone-item button {

            color: var(--text);

            font-weight: 600;

            align-items: center;
            justify-content: center;

            z-index: 2;

        .zone-item:hover button {
            color: var(--primary);
        }

        #repo-warning {

            transform: translateX(-50%);

            border-radius: 12px;
            font-weight: bold;
            font-size: 14px;
            z-index: 2000;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            text-align: center;

        }

            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        .section-header {

            align-items: center;
            justify-content: space-between;
            margin: 2rem 0 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid rgba(135, 206, 235, 0.2);
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .section-title svg {
            width: 24px;
            height: 24px;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 1.5rem;

        .zone-item {
            background: rgba(135, 206, 235, 0.03);

            cursor: pointer;

        }

        .star-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.75);

            stroke-width: 2;

        }

            fill: #ffd700;
            stroke: #ffd700;

        }

            font-size: 14px;
            padding: 20px;
            text-align: center;
            grid-column: 1 / -1;
        }


        #zoneViewer {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 1000;
            display: none;
            flex-direction: column;
            animation: slideInUp 0.3s ease;
        }

        @keyframes slideInUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }


        .zone-header {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--bg-secondary);
            border: 2px solid rgba(135, 206, 235, 0.2);
            color: var(--text);
            padding: 0.5rem 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            border-radius: 12px;
            z-index: 1001;
            max-width: 90%;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            user-select: none;
        }

        .zone-header.dragging {
            transition: none;
        }

        .zone-header.collapsed {
            top: 0;
            right: 20px;
            padding: 0.25rem 0.5rem;
            border-radius: 0 0 12px 12px;
            border-top: none;
            max-width: 80px;
        }

        .zone-header.collapsed .zone-title,
        .zone-header.collapsed .zone-controls {
            display: none;
        }

        .drag-handle {
            cursor: move;
            flex-shrink: 0;
        }

        .drag-handle.dragging {
            cursor: grabbing;
        }

        .zone-title {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 0.125rem;
        }

        #zoneName {
            font-size: 1rem;
            font-weight: 800;
            margin: 0;
            color: var(--primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #zoneId {
            display: none;
        }

        #zoneAuthor {
            font-size: 11px;
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.2s ease;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: block;
        }

        #zoneAuthor:hover {
            color: var(--primary);
        }

        .zone-controls {
            display: flex;
            gap: 0.5rem;
            flex-shrink: 0;
        }

        .zone-controls button {
            background: var(--surface);
            border: 2px solid var(--border);
            color: var(--text);
            padding: 0.375rem 0.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 700;
            transition: all 0.3s ease;
            white-space: nowrap;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.25rem;
            min-width: 32px;
            height: 32px;
        }

        .zone-controls button svg {
            width: 14px;
            height: 14px;
            flex-shrink: 0;
        }

        .zone-controls button:hover {
            background: rgba(135, 206, 235, 0.2);
            border-color: rgba(135, 206, 235, 0.4);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(135, 206, 235, 0.1);
        }

        #toggleHeaderBtn {
            background: var(--surface);
            border: 2px solid var(--border);
            color: var(--text);
            padding: 0.375rem 0.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 700;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 32px;
            height: 32px;
            flex-shrink: 0;
        }

        .zone-header.collapsed #toggleHeaderBtn {
            padding: 0.25rem 0.375rem;
            font-size: 12px;
            min-width: 28px;
            height: 28px;
            border-radius: 6px;
        }

        #toggleHeaderBtn:hover {
            background: rgba(135, 206, 235, 0.2);
            border-color: rgba(135, 206, 235, 0.4);
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(135, 206, 235, 0.1);
        }

        #zoneFrame {
            flex-grow: 1;
            border: none;
            width: 100%;
            height: 100%;
        }

        /* Popup */
        #popupOverlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(12px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 1rem;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .popup {
            background: var(--surface);
            border: 2px solid rgba(135, 206, 235, 0.2);
            border-radius: var(--radius);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 600px;
            max-height: 85vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            animation: slideInScale 0.3s ease;
        }

        @keyframes slideInScale {
            from {
                transform: scale(0.9) translateY(20px);
                opacity: 0;
            }
            to {
                transform: scale(1) translateY(0);
                opacity: 1;
            }
        }

        .popup-header {
            background: var(--bg-secondary);
            border-bottom: 2px solid rgba(135, 206, 235, 0.1);
            color: var(--text);
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #popupTitle {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary);
        }

        #popupClose {
            background: var(--surface);
            border: 2px solid var(--border);
            color: var(--text);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0.5rem;
            border-radius: var(--radius);
            transition: all 0.3s ease;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }

        #popupClose:hover {
            background: var(--primary);
            border-color: var(--primary);
            color: #000;
            transform: rotate(90deg);
        }

        #popupBody {
            padding: 2rem;
            overflow-y: auto;
            color: var(--text);
        }

        #popupBody input[type="text"],
        #popupBody input[type="file"] {
            width: 100%;
            padding: 1rem 1.25rem;
            margin-bottom: 1.5rem;
            border: 2px solid var(--border);
            border-radius: var(--radius);
            background: var(--bg-secondary);
            color: var(--text);
            font-size: 15px;
            font-weight: 500;
            transition: all 0.3s ease;
            outline: none;
        }

        #popupBody input[type="text"]:focus,
        #popupBody input[type="file"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-light);
        }

        .settings-button {
            background: rgba(135, 206, 235, 0.1);
            border: 2px solid rgba(135, 206, 235, 0.3);
            color: #87CEEB;
            padding: 1rem 2rem;
            font-size: 16px;
            font-weight: 700;
            border-radius: var(--radius);
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            text-align: center;
            box-shadow: 0 4px 15px rgba(135, 206, 235, 0.1);
        }

        .settings-button:hover {
            transform: translateY(-3px);
            background: rgba(135, 206, 235, 0.15);
            box-shadow: 0 8px 25px rgba(135, 206, 235, 0.15);
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(135, 206, 235, 0.2); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(135, 206, 235, 0.3); }

        @media (max-width: 768px) {
            .header-content {
                padding: 1.5rem 1rem 1rem;
            }

            .search-container {
                width: 100%;
                max-width: none;
                flex-wrap: wrap;
            }

            main {
                padding: 1rem;
            }

            #container {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
                gap: 1rem;
            }

            .zone-header {
                top: 10px;
                right: 10px;
                padding: 0.5rem 0.625rem;
                flex-wrap: wrap;
                gap: 0.5rem;
            }

            .zone-header.collapsed {
                top: 0;
                right: 10px;
                padding: 0.25rem 0.375rem;
                max-width: 70px;
            }

            #zoneName {
                font-size: 0.875rem;
            }

            .zone-controls {
                width: 100%;
                gap: 0.375rem;
            }

            .zone-controls button {
                flex: 1;
                padding: 0.375rem;
                font-size: 10px;
                min-width: 28px;
                height: 28px;
            }
            
            .zone-controls button svg {
                width: 12px;
                height: 12px;
            }
        }

        @media (max-width: 480px) {
            #container {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            }
        }
    </style>

    <script>
const container = document.getElementById('container');
const zoneViewer = document.getElementById('zoneViewer');
let zoneFrame = document.getElementById('zoneFrame');
const searchBar = document.getElementById('searchBar');
const sortOptions = document.getElementById('sortOptions');
const filterOptions = document.getElementById('filterOptions');

const zonesurls = [
    "https://cdn.jsdelivr.net/gh/freebuisness/assets@latest/zones.json",
    "https://cdn.jsdelivr.net/gh/freebuisness/assets@master/zones.json",
    "https://cdn.jsdelivr.net/gh/freebuisness/assets/zones.json"
];
let zonesURL = zonesurls[Math.floor(Math.random() * zonesurls.length)];
const coverURL = "https://cdn.jsdelivr.net/gh/freebuisness/covers@main";
const htmlURL = "https://cdn.jsdelivr.net/gh/freebuisness/html@main";
let zones = [];
let popularityData = {};

let lazyImageObserver = null;

function getLazyImageObserver() {
    if (!lazyImageObserver) {
        lazyImageObserver = new IntersectionObserver((entries, observer) => {
            entries.forEach(entry => {
                if (entry.isIntersecting && entry.target.classList.contains('lazy-zone-img')) {
                    const img = entry.target;
                    img.src = img.dataset.src;
                    img.classList.remove('lazy-zone-img');
                    observer.unobserve(img);
                }
            });
        }, {
            rootMargin: "100px",
            threshold: 0.1
        });
    }
    return lazyImageObserver;
}

const FEATURED_GAMES = ['R.E.P.O', 'Brotato', 'Five Nights at Epsteins', 'Basket Bros', 'Drift Hunters', 'UltraKill', 'Bitlife'];

function getFavorites() {
    try {
        return JSON.parse(localStorage.getItem('favoriteGames') || '[]');
    } catch {
        return [];
    }
}

function saveFavorites(favorites) {
    localStorage.setItem('favoriteGames', JSON.stringify(favorites));
}

function toggleFavorite(zoneId, event) {
    event.stopPropagation();
    const favorites = getFavorites();
    const index = favorites.indexOf(zoneId);
    if (index > -1) {
        favorites.splice(index, 1);
    } else {
        favorites.push(zoneId);
    }
    saveFavorites(favorites);
    displayZones(zones);
}

function isFavorite(zoneId) {
    return getFavorites().includes(zoneId);
}

function isFeatured(zoneName) {
    return FEATURED_GAMES.some(fg => zoneName && zoneName.toLowerCase().includes(fg.toLowerCase()));
}

function toTitleCase(str) {
    return str.replace(
        /\w\S*/g,
        text => text.charAt(0).toUpperCase() + text.substring(1).toLowerCase()
    );
}


function toggleHeader() {
    const header = document.getElementById('zoneHeader');
    const toggleBtn = document.getElementById('toggleHeaderBtn');
    header.classList.toggle('collapsed');
    toggleBtn.textContent = header.classList.contains('collapsed') ? '▲' : '▼';
}


let isDragging = false;
let currentX;
let currentY;
let initialX;
let initialY;
let xOffset = 0;
let yOffset = 0;

function dragStart(e) {
    const header = document.getElementById('zoneHeader');
    const dragHandle = document.getElementById('dragHandle');
    
    if (e.type === "touchstart") {
        initialX = e.touches[0].clientX - xOffset;
        initialY = e.touches[0].clientY - yOffset;
    } else {
        initialX = e.clientX - xOffset;
        initialY = e.clientY - yOffset;
    }

    if (e.target === dragHandle || dragHandle.contains(e.target)) {
        isDragging = true;
        header.classList.add('dragging');
        dragHandle.classList.add('dragging');
    }
}

function dragEnd(e) {
    const header = document.getElementById('zoneHeader');
    const dragHandle = document.getElementById('dragHandle');
    initialX = currentX;
    initialY = currentY;
    isDragging = false;
    header.classList.remove('dragging');
    dragHandle.classList.remove('dragging');
}

function drag(e) {
    if (isDragging) {
        e.preventDefault();
        const header = document.getElementById('zoneHeader');
        
        if (e.type === "touchmove") {
            currentX = e.touches[0].clientX - initialX;
            currentY = e.touches[0].clientY - initialY;
        } else {
            currentX = e.clientX - initialX;
            currentY = e.clientY - initialY;
        }

        xOffset = currentX;
        yOffset = currentY;

        setTranslate(currentX, currentY, header);
    }
}

function setTranslate(xPos, yPos, el) {
    el.style.transform = `translate(${xPos}px, ${yPos}px)`;
}


document.addEventListener('DOMContentLoaded', () => {
    const dragHandle = document.getElementById('dragHandle');
    
    dragHandle.addEventListener('mousedown', dragStart);
    dragHandle.addEventListener('touchstart', dragStart);
    
    document.addEventListener('mouseup', dragEnd);
    document.addEventListener('touchend', dragEnd);
    
    document.addEventListener('mousemove', drag);
    document.addEventListener('touchmove', drag);
});

async function listZones() {
    try {
        let sharesponse;
        let shajson;
        let sha;
        try {
            sharesponse = await fetch("https://api.github.com/repos/freebuisness/assets/commits?t="+Date.now());
        } catch (error) {}
        if (sharesponse && sharesponse.status === 200) {
            try {
                shajson = await sharesponse.json();
                sha = shajson[0]['sha'];
                if (sha) {
                    zonesURL = `https://cdn.jsdelivr.net/gh/freebuisness/assets@${sha}/zones.json`;
                }
            } catch (error) {
                try {
                    let secondarysharesponse = await fetch("https://raw.githubusercontent.com/freebuisness/xml/refs/heads/main/sha.txt?t="+Date.now());
                    if (secondarysharesponse && secondarysharesponse.status === 200) {
                        sha = (await secondarysharesponse.text()).trim();
                        if (sha) {
                            zonesURL = `https://cdn.jsdelivr.net/gh/freebuisness/assets@${sha}/zones.json`;
                        }
                    }
                } catch(error) {}
            }
        }
        const response = await fetch(zonesURL+"?t="+Date.now());
        if (!response.ok) throw new Error("Failed to fetch zones");
        const json = await response.json();
        
 
        const patcher = [-1,596]; 
        zones = json.filter(zone => !patcher.includes(zone.id));
        
        await fetchPopularity();
        sortZones();
        const search = new URLSearchParams(window.location.search);
        const id = search.get('id');
        const embed = window.location.hash.includes("embed");
        if (id) {
            const zone = zones.find(zone => zone.id + '' == id + '');
            if (zone) {
                if (embed) {
                    if (zone.url.startsWith("http")) {
                        window.open(zone.url, "_blank");
                    } else {
                        const url = zone.url.replace("{COVER_URL}", coverURL).replace("{HTML_URL}", htmlURL);
                        fetch(url+"?t="+Date.now()).then(response => response.text()).then(html => {
                            document.documentElement.innerHTML = html;
                            const popup = document.createElement("div");
                            popup.style.position = "fixed";
                            popup.style.bottom = "20px";
                            popup.style.right = "20px";
                            popup.style.backgroundColor = "#1a1a1a";
                            popup.style.color = "#87CEEB";
                            popup.style.padding = "10px";
                            popup.style.border = "2px solid #87CEEB";
                            popup.style.borderRadius = "16px";
                            popup.style.boxShadow = "0px 0px 20px rgba(135, 206, 235, 0.5)";
                            popup.style.fontFamily = "'Inter', sans-serif";
                            
                            popup.innerHTML = `Play more Lessons at <a href="https://onlylessons.com" target="_blank" style="color:#87CEEB; font-weight:bold;">OnlyLessons</a>!`;
                            
                            const closeBtn = document.createElement("button");
                            closeBtn.innerText = "✕";
                            closeBtn.style.marginLeft = "10px";
                            closeBtn.style.background = "none";
                            closeBtn.style.border = "none";
                            closeBtn.style.cursor = "pointer";
                            closeBtn.style.color = "#87CEEB";
                            closeBtn.style.fontWeight = "bold";
                            
                            closeBtn.onclick = () => popup.remove();
                            popup.appendChild(closeBtn);
                            document.body.appendChild(popup);
                            document.documentElement.querySelectorAll('script').forEach(oldScript => {
                                const newScript = document.createElement('script');
                                if (oldScript.src) {
                                    newScript.src = oldScript.src;
                                } else {
                                    newScript.textContent = oldScript.textContent;
                                }
                                document.body.appendChild(newScript);
                            });
                        }).catch(error => alert("Failed to load zone: " + error));
                    }
                } else {
                    openZone(zone);
                }
            }
        }

        let alltags = [];
        for (const obj of json) {
            if (Array.isArray(obj.special)) {
                alltags.push(...obj.special);
            }
        }

        alltags = [...new Set(alltags)];
        let filteroption = document.getElementById("filterOptions");
        if (filteroption && filteroption.children.length > 1) {
            while (filteroption.children.length > 1) {
                filteroption.removeChild(filteroption.lastElementChild);
            }
        }
        for (const tag of alltags) {
            const opt = document.createElement("option");
            opt.value = tag;
            opt.textContent = toTitleCase(tag);
            filteroption.appendChild(opt);
        }
    } catch (error) {
        console.error(error);
        container.innerHTML = `Error loading zones: ${error.message}. <button onclick="listZones()" style="background:#87CEEB;color:#000;padding:10px 20px;border:none;border-radius:8px;cursor:pointer;margin-top:10px;">Retry</button>`;
    }
}

async function fetchPopularity() {
    try {
        const response = await fetch("https://data.jsdelivr.com/v1/stats/packages/gh/freebuisness/html@main/files?period=year");
        const data = await response.json();
        data.forEach(file => {
            const idMatch = file.name.match(/\/(\d+)\.html$/);
            if (idMatch) {
                const id = parseInt(idMatch[1]);
                popularityData[id] = file.hits.total;
            }
        });
    } catch (error) {
        popularityData[0] = 0;
    }
}

function sortZones() {
    const sortBy = sortOptions.value;
    if (sortBy === 'name') {
        zones.sort((a, b) => a.name.localeCompare(b.name));
    } else if (sortBy === 'id') {
        zones.sort((a, b) => a.id - b.id);
    } else if (sortBy === 'popular') {
        zones.sort((a, b) => (popularityData[b.id] || 0) - (popularityData[a.id] || 0));
    }
    zones.sort((a, b) => (a.id === -1 ? -1 : b.id === -1 ? 1 : 0));
    displayZones(zones);
}

function createZoneItem(file) {
    const zoneItem = document.createElement("div");
    zoneItem.className = "zone-item";
    zoneItem.onclick = () => openZone(file);
    
    if (isFeatured(file.name)) {
        const badge = document.createElement("div");
        badge.className = "featured-badge";
        badge.textContent = "Featured";
        zoneItem.appendChild(badge);
    }
    
    const starBtn = document.createElement("button");
    starBtn.className = "star-btn" + (isFavorite(file.id) ? " favorited" : "");
    starBtn.innerHTML = `<svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`;
    starBtn.onclick = (event) => toggleFavorite(file.id, event);
    zoneItem.appendChild(starBtn);
    
    const img = document.createElement("img");
    img.dataset.src = file.cover.replace("{COVER_URL}", coverURL).replace("{HTML_URL}", htmlURL);
    img.alt = file.name;
    img.loading = "lazy";
    img.className = "lazy-zone-img";
    zoneItem.appendChild(img);
    
    const button = document.createElement("button");
    button.textContent = file.name;
    button.onclick = (event) => {
        event.stopPropagation();
        openZone(file);
    };
    zoneItem.appendChild(button);
    
    return zoneItem;
}

    const favorited = zones.filter(z => favorites.includes(z.id) && !isFeatured(z.name));

function openZone(file) {
    if (file.url.startsWith("http")) {
        window.open(file.url, "_blank");
    } else {
        const url = file.url.replace("{COVER_URL}", coverURL).replace("{HTML_URL}", htmlURL);
        
        // Show loading state
        const loadingMsg = document.getElementById('zoneName');
        const originalName = loadingMsg.textContent;
        loadingMsg.textContent = "Loading...";
        
        fetch(url+"?t="+Date.now())
            .then(response => {
                if (!response.ok) throw new Error("Failed to fetch game");
                return response.text();
            })
            .then(html => {
                if (zoneFrame.contentDocument === null) {
                    zoneFrame = document.createElement("iframe");
                    zoneFrame.id = "zoneFrame";
                    zoneFrame.sandbox = "allow-scripts allow-same-origin allow-forms allow-popups allow-top-navigation allow-modals";
                    zoneViewer.appendChild(zoneFrame);
                }
                zoneFrame.contentDocument.open();
                zoneFrame.contentDocument.write(html);
                zoneFrame.contentDocument.close();
                document.getElementById('zoneName').textContent = file.name;
                document.getElementById('zoneId').textContent = file.id;
                document.getElementById('zoneAuthor').textContent = "by " + file.author;
                if (file.authorLink) {
                    document.getElementById('zoneAuthor').href = file.authorLink;
                }
                
                // Reset header to expanded state when opening new zone
                const header = document.getElementById('zoneHeader');
                const toggleBtn = document.getElementById('toggleHeaderBtn');
                header.classList.remove('collapsed');
                toggleBtn.textContent = '▼';
                
                // Reset position
                xOffset = 0;
                yOffset = 0;
                header.style.transform = 'translate(0, 0)';
                
                zoneViewer.style.display = "flex";
                const url = new URL(window.location);
                url.searchParams.set('id', file.id);
                history.pushState(null, '', url.toString());
                zoneViewer.hidden = true;
                
                // Show R.E.P.O warning if it's R.E.P.O
                if (file.name && file.name.toLowerCase().includes('r.e.p.o')) {
                    setTimeout(() => {
                        const warning = document.createElement('div');
                        warning.id = 'repo-warning';
                        warning.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(255,200,0,0.95);color:#000;padding:15px 25px;border-radius:12px;font-weight:bold;font-size:14px;z-index:2000;box-shadow:0 4px 20px rgba(0,0,0,0.5);text-align:center;max-width:90%;';
                        warning.innerHTML = '⚠️ R.E.P.O takes 5-10 seconds to load.<br>If you see a black screen, please wait!';
                        document.body.appendChild(warning);
                        setTimeout(() => warning.remove(), 12000);
                    }, 1500);
                }
            })
            .catch(error => {
                loadingMsg.textContent = originalName;
                alert("Failed to load zone: " + error.message);
            });
    }
}

function aboutBlank() {
    const zoneId = document.getElementById('zoneId').textContent;
    const zone = zones.find(z => z.id + '' === zoneId);
    if (!zone) {
        alert("No game selected");
        return;
    }
    
    let zoneUrl = zone.url;
    if (!zoneUrl.startsWith("http")) {
        zoneUrl = zoneUrl.replace("{COVER_URL}", coverURL).replace("{HTML_URL}", htmlURL);
    }
    
    // Open new tab first (before fetch to avoid popup blocker)
    const newWindow = window.open("about:blank", "_blank");
    if (!newWindow) {
        alert("Please allow popups to open new tab");
        return;
    }
    
    // Show loading in new window
    newWindow.document.write(`
        <!DOCTYPE html>
        <html>
        <head>
            <title>${zone.name || 'Game'}</title>
            <style>
                body { background: #1a1a1a; color: #87CEEB; font-family: system-ui, sans-serif;

                @keyframes spin { to { transform: rotate(360deg); } }
            </style>
        </head>
        <body>
            <div class="loader"><div class="spinner"></div><p>Loading game...</p></div>
        </body>
        </html>
    `);
    
    fetch(zoneUrl + "?t=" + Date.now())
        .then(response => {

        })
        .then(html => {

        .catch(error => {

function closeZone() {
    zoneViewer.hidden = false;
    zoneViewer.style.display = "none";
    if (zoneViewer.contains(zoneFrame)) {
        zoneViewer.removeChild(zoneFrame);
    }
    zoneFrame = document.createElement("iframe");
    zoneFrame.id = "zoneFrame";
    zoneFrame.sandbox = "allow-scripts allow-same-origin allow-forms allow-popups allow-top-navigation allow-modals";
    zoneViewer.appendChild(zoneFrame);
    const url = new URL(window.location);
    url.searchParams.delete('id');
    history.pushState(null, '', url.toString());
}

function downloadZone() {
    let zone = zones.find(zone => zone.id + '' === document.getElementById('zoneId').textContent);
    fetch(zone.url.replace("{HTML_URL}", htmlURL)+"?t="+Date.now()).then(res => res.text()).then(text => {
        const blob = new Blob([text], {
            type: "text/plain;charset=utf-8"
        });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = zone.name + ".html";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    });
}

}

const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resizeCanvas();

let snowflakes = [];

class Snowflake {
    constructor() {
        this.reset();
    }
    reset() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * -canvas.height;
        this.size = Math.random() * 3 + 1;
        this.speedY = Math.random() * 2 + 0.5;
        this.speedX = Math.random() * 1 - 0.5;
        this.opacity = Math.random() * 0.7 + 0.3;
    }
    update() {
        this.x += this.speedX + Math.sin(this.y * 0.01) * 0.3;
        this.y += this.speedY;
        if (this.y > canvas.height) {
            this.reset();
            this.y = -10;
        }
    }
    draw() {
        ctx.fillStyle = `rgba(135, 206, 235, ${this.opacity})`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
    }
}

function initSnow() {
    snowflakes = [];
    for (let i = 0; i < 150; i++) {
        snowflakes.push(new Snowflake());
    }
}

function animateSnow() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    snowflakes.forEach(flake => {
        flake.update();
        flake.draw();
    });
    requestAnimationFrame(animateSnow);
}

window.addEventListener("resize", () => {
    resizeCanvas();
    initSnow();
});

initSnow();
animateSnow();

// Hide title on scroll (with debounce to prevent glitching)
let scrollTimeout;
window.addEventListener('scroll', () => {
    if (scrollTimeout) return;
    scrollTimeout = setTimeout(() => {
        scrollTimeout = null;
        const currentScroll = window.pageYOffset;
        const pageTitle = document.querySelector('.page-title');
        if (pageTitle) {
            if (currentScroll > 50) {
                pageTitle.style.display = 'none';
            } else {
                pageTitle.style.display = 'block';
            }
        }
    }, 50);
});

const schoolList = ["deledao", "goguardian", "lightspeed", "linewize", "securly", ".edu/"];

function isBlockedDomain(url) {
    const domain = new URL(url, location.origin).hostname + "/";
    return schoolList.some(school => domain.includes(school));
}

const originalFetch = window.fetch;
window.fetch = function (url, options) {
    if (isBlockedDomain(url)) {
        console.warn(`Blocked`);
        return Promise.reject(new Error("Blocked"));
    }
    return originalFetch.apply(this, arguments);
};

const originalOpen = XMLHttpRequest.prototype.open;
XMLHttpRequest.prototype.open = function (method, url) {
    if (isBlockedDomain(url)) {
        console.warn(`Blocked`);
        return;
    }
    return originalOpen.apply(this, arguments);
};
