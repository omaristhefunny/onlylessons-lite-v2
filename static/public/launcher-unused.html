  <p style="margin-top: 20px; font-size: 0.8rem;">Cloaked mode hides the site in an about:blank tab. Use direct if you have popup blocker issues.</p>

  <script>
    function openCloaked() {
      // code by interstellar im not tryna be a skidd :3
      try {
        inFrame = window !== top
      } catch (e) {
        inFrame = true
      }

      if (inFrame) {
        window.location.href = '/main.html';
        return;
      }

      if (navigator.userAgent.includes("Firefox")) {
        window.location.href = '/main.html';
        return;
      }

      const popup = open("about:blank", "_blank")
      if (!popup || popup.closed) {
        alert("Hey look buddy, I'm an engineer, and I solve practical problems. Your browser is blocking popups, which prevents me from opening in about:blank. Please disable your popup blocker for this site and try again. - engineer tf2.")
      } else {
        const doc = popup.document
        const iframe = doc.createElement("iframe")
        const style = iframe.style
        const link = doc.createElement("link")

        const name = localStorage.getItem("name") || "Home";
        const icon = localStorage.getItem("icon") || "https://upload.wikimedia.org/wikipedia/commons/5/59/Google_Classroom_Logo.png";
        
        doc.title = name;
        link.rel = "icon";
        link.href = icon;
        
        iframe.src = location.origin + '/main.html'
        style.position = "fixed"
        style.top = style.bottom = style.left = style.right = 0
        style.border = style.outline = "none"
        style.width = style.height = "100%"

        doc.head.appendChild(link);
        doc.body.appendChild(iframe)
        location.replace("https://classroom.google.com")
      }
    }
  </script>
