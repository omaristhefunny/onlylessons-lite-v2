<script>
  const searchInput = document.getElementById('searchInput');
  const searchEngine = document.getElementById('searchEngine');

  const searchUrls = {
    duckduckgo: 'https://duckduckgo.com/?t=h_&q=',
    brave: 'https://search.brave.com/search?q=',
    bing: 'https://www.bing.com/search?q=',
    yahoo: 'https://search.yahoo.com/search?p='
  };

  const jumpVideo = document.getElementById('goonerVideo');
  jumpVideo.load();

  jumpVideo.addEventListener('ended', () => {
    document.getElementById('goonerOverlay').style.display = 'none';
    jumpVideo.currentTime = 0;
  });

  function triggergooner() {
    const overlay = document.getElementById('goonerOverlay');
    jumpVideo.currentTime = 0;
    jumpVideo.playbackRate = 1.0;
    overlay.style.display = 'block';
    jumpVideo.play().catch(() => {});
  }

  document.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
      e.preventDefault();
      searchInput.focus();
    }
  });

  searchInput.addEventListener('keydown', async (e) => {
    if (e.key !== 'Enter') return;
    const query = searchInput.value.trim();
    if (!query) return;

    const BAD = ['porn','pornhub','xvideos','xnxx','onlyfans','redtube',
      'youporn','xvideo','brazzers','hentai','xxx','nsfw','rule34',
      'sex','nude','naked','lewd','erotic','baddie', 'gooning'];
    const cleaned = query.toLowerCase().replace(/\s+/g, '');

    if (BAD.some(kw => cleaned.includes(kw))) {
      triggergooner();
      searchInput.value = '';
      return;
    }

    try {
      const res = await fetch(`/api/search-check?q=${encodeURIComponent(query)}`);
      const data = await res.json();
      if (data.blocked) {
        triggergooner();
        searchInput.value = '';
        return;
      }
    } catch (_) {}

    const engine = searchEngine.value;
    window.location.href = '/g?embed=embed.html#' + searchUrls[engine] + encodeURIComponent(query);
  });
</script>

  <script>
    const STORAGE_KEY = 'onlylessons_custom_apps';

    function getCustomApps() {
      const apps = localStorage.getItem(STORAGE_KEY);
      return apps ? JSON.parse(apps) : [];
    }

    function saveCustomApps(apps) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(apps));
    }

    function renderCustomApps() {
      const customApps = getCustomApps();
      const appIcons = document.querySelector('.app-icons');
      const addBtn = document.getElementById('addCustomBtn').parentElement;

      document.querySelectorAll('.custom-app-wrapper').forEach(el => el.remove());

      customApps.forEach((app, index) => {
        const wrapper = document.createElement('div');
        wrapper.className = 'app-button-wrapper custom-app-wrapper';
        const appTitle = app.title || '?';
        let url = app.url;
        if (!url.startsWith('http://') && !url.startsWith('https://')) url = 'https://' + url;
        wrapper.innerHTML = `
          <a href="/g?embed=embed.html#${url}" class="app-button">
            ${app.image
              ? `<img src="${app.image}" alt="${appTitle}">`
              : `<div class="letter-icon">${appTitle.charAt(0).toUpperCase()}</div>`}
            <span>${appTitle}</span>
          </a>
          <button class="custom-app-delete" data-index="${index}">&times;</button>
        `;
        appIcons.insertBefore(wrapper, addBtn);
      });

      document.querySelectorAll('.custom-app-delete').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.preventDefault();
          e.stopPropagation();
          const apps = getCustomApps();
          apps.splice(parseInt(btn.dataset.index), 1);
          saveCustomApps(apps);
          renderCustomApps();
        });
      });
    }

    const modal = document.getElementById('customAppModal');
    const addCustomBtn = document.getElementById('addCustomBtn');
    const cancelCustomApp = document.getElementById('cancelCustomApp');
    const saveCustomApp = document.getElementById('saveCustomApp');
    const customAppName = document.getElementById('customAppName');
    const customAppUrl = document.getElementById('customAppUrl');
    const customAppImage = document.getElementById('customAppImage');

    addCustomBtn.addEventListener('click', () => {
      modal.classList.add('active');
      customAppName.value = '';
      customAppUrl.value = '';
      customAppImage.value = '';
      customAppName.focus();
    });

    [cancelCustomApp].forEach(btn => btn.addEventListener('click', () => modal.classList.remove('active')));
    modal.addEventListener('click', (e) => { if (e.target === modal) modal.classList.remove('active'); });

    saveCustomApp.addEventListener('click', () => {
      const title = customAppName.value.trim();
      const url = customAppUrl.value.trim();
      const image = customAppImage.value.trim();
      if (!title || !url) { alert('Please fill in both fields'); return; }
      const apps = getCustomApps();
      apps.push({ title, url, image });
      saveCustomApps(apps);
      renderCustomApps();
      modal.classList.remove('active');
    });

    renderCustomApps();
  </script>
