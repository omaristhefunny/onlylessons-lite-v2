<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IXL | Math, Language Arts, Science, Social Studies, and Spanish</title>
    <link rel="icon" href="/stuff/jolly.png">
    <meta name="theme-color" content="#00ffa6">
    <meta name="description" content="Studying utilities for students.">
    <script src="register-sw.js"></script>
    <script src="lessons/bundle.js"></script>
    <script src="lessons/config.js"></script>
    <script src="lessons/embed.js"></script>
    <script src="/js/panic.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #0a0a0f; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        
        .browser-bar {
            position: fixed; top: 0; left: 0; right: 0; height: 52px;
            background: linear-gradient(180deg, #16161e 0%, #0f0f14 100%);
            border-bottom: 1px solid rgba(34, 211, 238, 0.12);
            z-index: 999999;
            display: flex; align-items: center; justify-content: center;
            padding: 0 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }
        
        .browser-bar-content { width: 100%; max-width: 640px; display: flex; align-items: center; gap: 12px; }
        
        .url-input-wrapper { position: relative; flex: 1; display: flex; align-items: center; }
        
        .lock-icon { position: absolute; left: 14px; width: 16px; height: 16px; color: #22d3ee; pointer-events: none; z-index: 2; }
        
        .url-input {
            flex: 1; height: 36px; padding: 0 16px 0 42px;
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.02) 100%);
            border: 1px solid rgba(34,211,238,0.15);
            border-radius: 20px; color: #e0e7ff; font-size: 14px; outline: none;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }
        
        .url-input::placeholder { color: rgba(34, 211, 238, 0.4); }
        .url-input:focus { 
            background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.04) 100%);
            border-color: rgba(34,211,238,0.4); 
            box-shadow: 0 0 20px rgba(34, 211, 238, 0.15);
        }
        
        .btn {
            width: 36px; height: 36px; background: linear-gradient(135deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.03) 100%);
            border: 1px solid rgba(34,211,238,0.15); border-radius: 50%;
            color: #22d3ee; cursor: pointer; display: flex; align-items: center;
            justify-content: center; flex-shrink: 0; transition: all 0.2s ease;
            backdrop-filter: blur(10px);
        }
        
        .btn:hover { 
            background: linear-gradient(135deg, rgba(34,211,238,0.15) 0%, rgba(34,211,238,0.08) 100%);
            border-color: rgba(34,211,238,0.4);
            transform: scale(1.05);
        }
        .btn svg { width: 16px; height: 16px; }
        
        .proxy-iframe {
            position: fixed; top: 52px; left: 0; width: 100%; height: calc(100vh - 52px);
            border: none; background: #fff; z-index: 1;
        }
        
        .loading-overlay {
            position: fixed; top: 52px; left: 0; width: 100%; height: calc(100vh - 52px);
            background: linear-gradient(135deg, #0a0a0f 0%, #12121a 50%, #0a0a0f 100%);
            z-index: 9998; display: none; align-items: center; justify-content: center;
            overflow: hidden;
        }
        
        .loading-overlay::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                radial-gradient(circle at 20% 80%, rgba(34, 211, 238, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(139, 92, 246, 0.06) 0%, transparent 50%);
            pointer-events: none;
        }
        
        #loading-container { 
            text-align: center; 
            padding: 50px 60px; 
            background: linear-gradient(135deg, rgba(25,25,35,0.9) 0%, rgba(15,15,20,0.95) 100%);
            border: 1px solid rgba(34,211,238,0.2);
            border-radius: 24px;
            position: relative;
            z-index: 1;
            backdrop-filter: blur(20px);
            box-shadow: 
                0 20px 60px rgba(0,0,0,0.5),
                0 0 40px rgba(34, 211, 238, 0.1),
                inset 0 1px 0 rgba(255,255,255,0.05);
        }
        
        .loader-container {
            position: relative;
            width: 80px;
            height: 80px;
            margin: 0 auto 24px;
        }
        
        .loader {
            width: 100%;
            height: 100%;
            border: 3px solid rgba(34,211,238,0.1);
            border-top-color: #22d3ee;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        .loader::before {
            content: '';
            position: absolute;
            top: 5px; left: 5px; right: 5px; bottom: 5px;
            border: 2px solid transparent;
            border-top-color: rgba(139, 92, 246, 0.6);
            border-radius: 50%;
            animation: spin 1.2s linear infinite reverse;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        
        #theh1 { 
            font-size: 20px; 
            font-weight: 600; 
            color: #fff; 
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }
        
        #thep { 
            font-size: 14px; 
            color: rgba(34, 211, 238, 0.7);
            font-weight: 400;
        }
        
        .loading-dots {
            display: inline-flex;
            gap: 4px;
            margin-left: 4px;
        }
        
        .loading-dots span {
            width: 4px;
            height: 4px;
            background: #22d3ee;
            border-radius: 50%;
            animation: dotPulse 1.4s infinite ease-in-out;
        }
        
        .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes dotPulse {
            0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
            40% { opacity: 1; transform: scale(1); }
        }
        
        .progress-bar {
            width: 200px;
            height: 3px;
            background: rgba(34,211,238,0.1);
            border-radius: 3px;
            margin: 20px auto 0;
            overflow: hidden;
        }
        
        .progress-bar::after {
            content: '';
            display: block;
            width: 40%;
            height: 100%;
            background: linear-gradient(90deg, transparent, #22d3ee, transparent);
            border-radius: 3px;
            animation: progress 1.5s ease-in-out infinite;
        }
        
        @keyframes progress {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(300%); }
        }

        .empty-state {
            position: fixed;
            top: 52px;
            left: 0;
            width: 100%;
            height: calc(100vh - 52px);
            background: linear-gradient(135deg, #0a0a0f 0%, #12121a 50%, #0a0a0f 100%);
            z-index: 9997;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .empty-state::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                radial-gradient(circle at 30% 70%, rgba(34, 211, 238, 0.06) 0%, transparent 50%),
                radial-gradient(circle at 70% 30%, rgba(139, 92, 246, 0.05) 0%, transparent 50%);
            pointer-events: none;
        }

        .empty-content {
            text-align: center;
            padding: 40px;
            position: relative;
            z-index: 1;
        }

        .empty-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, rgba(34,211,238,0.1) 0%, rgba(139,92,246,0.1) 100%);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(34,211,238,0.2);
        }

        .empty-icon svg {
            width: 40px;
            height: 40px;
            color: #22d3ee;
        }

        .empty-title {
            font-size: 22px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        .empty-subtitle {
            font-size: 15px;
            color: rgba(34, 211, 238, 0.6);
            max-width: 300px;
        }
        
        @media (max-width: 600px) {
            .browser-bar { padding: 0 12px; }
            .url-input { height: 32px; font-size: 13px; }
            .lock-icon { left: 12px; width: 14px; height: 14px; }
            .btn { width: 32px; height: 32px; }
            #loading-container { padding: 40px 30px; margin: 20px; }
            .empty-title { font-size: 18px; }
        }
    </style>
</head>
<body style="background-color: #0a0a0f; margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden;">
    <script>window.browserBarVisible = true;</script>
    
    <iframe id="proxy-iframe" class="proxy-iframe" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-top-navigation"></iframe>
    
    <div class="browser-bar">
        <div class="browser-bar-content">
            <a href="/main.html" class="btn home-btn" title="Home">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
            </a>
            <div class="url-input-wrapper">
                <svg class="lock-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
                <input type="text" class="url-input" id="browser-url" placeholder="Search or enter URL..." enterkeyhint="go">
                <button class="btn refresh-btn" id="refresh-btn" title="Refresh">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>
    
    <div id="empty-state" class="empty-state">
        <div class="empty-content">
            <div class="empty-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <circle cx="12" cy="12" r="10"/>
                    <path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                </svg>
            </div>
            <h2 class="empty-title">Welcome</h2>
            <p class="empty-subtitle">Enter a website address or search query in the bar above to get started</p>
        </div>
    </div>
    
    <div id="loading-overlay" class="loading-overlay">
        <div id="loading-container">
            <div class="loader-container">
                <div class="loader"></div>
            </div>
            <h1 id="theh1">Loading<span class="loading-dots"><span></span><span></span><span></span></span></h1>
            <p id="thep">Connecting to website...</p>
            <div class="progress-bar"></div>
        </div>
    </div>
</body>
</html>
