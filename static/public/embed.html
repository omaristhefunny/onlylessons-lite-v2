<!DOCTYPE html>
<html>
    <head>
        <title>Study.com | Math</title>
        <link rel="icon" href="/stuff/jolly.png">
        <link rel="stylesheet" href="/stuff/css/styles.css">
        <link rel="stylesheet" href="/stuff/css/alert.css">
        <link rel="icon" href="/stuff/jolly.png">
        <meta property="og:title" content="Study.com">
        <meta name="theme-color" content="#00ffa6">
        <meta name="msapplication-TileColor" content="#00ffa6">
        <meta name="description" content="Studying utilities for students.">
        <meta property="og:description" content="Studying utilities for students.">
        <script src="register-sw.js"></script>
        <script src="frog/bundle.js"></script>
        <script src="frog/config.js"></script>
        <script src="frog/embed.js"></script>
    </head>
    <body style="background-color: black; margin: 0; padding: 0;">
        <div id="fadeout"></div>
        <div id="loadingbox">
            <h1 id="theh1">deploying proxy....</h1>
            <p id="thep">this might take a bit</p>
            <p>credits to frogieethius the 1st (frogiee1)</p>
        </div>
        <span class="loader"></span>
        <div id="teacher-setup-dialogs-container"></div>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r121/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>
<script>
VANTA.NET({
  el: "#fadeout",
  mouseControls: true,
  touchControls: true,
  gyroControls: false,
  minHeight: 200.00,
  minWidth: 200.00,
  scale: 1.00,
  scaleMobile: 1.00,
  color: 0xff5f00,
  backgroundColor: 0x0,
  showDots: false
})
</script>
        <script>
          function lowtaperfade(){
            // yes, thats all it does.
            // uv does not like using the style tag as it is defined somewhere in uv and that breaks this page if
            // document.getElementById('fadeout').style = "opacity: 0;" is used in embed.js
            document.getElementById('fadeout').style = "opacity: 0;"
          }
          function highslipperybuzz(){
            document.getElementById('fadeout').style = "opacity: 1;"
            document.getElementById('theh1').innerText = "this is taking a while..."
            document.getElementById('thep').innerText = "the server might be overloaded, or the requested site is slow right now."
          }
        </script>
        <style>
          html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
          }
          #fadeout{
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            transition: all ease-in-out .4s;
            z-index: 9998;
          }
          #loadingbox{
            position: fixed;
            z-index: 9999;
  text-align: center;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  border-radius: 35px;
  color: white;
  padding: 30px;
  line-height: 1.8;
  overflow: clip;
  scrollbar-width: none;
  -ms-overflow-style: none;
          }
            .loader {
  width: 100%;
  height: 4.8px;
  display: inline-block;
  position: fixed;
  background: rgba(255, 255, 255, 0.15);
  overflow: hidden;
  border-radius: 10px;
  z-index: 9999;
  left: 0;
  bottom: 0;
  padding: 0;
  margin: none;
}
.loader::after {
  content: '';
  width: 192px;
  height: 4.8px;
  background: #FFF;
  position: absolute;
  top: 0;
  left: 0;
  box-sizing: border-box;
  animation: animloader 2s linear infinite;
  z-index: 9999;
  bottom: 0;
  padding: 0;
  margin: none;
}
#teacher-setup-dialogs-container{
  filter: drop-shadow(0px 0px 10px #ffffff);
}
@keyframes animloader {
  0% {
    left: 0;
    transform: translateX(-100%);
  }
  100% {
    left: 100%;
    transform: translateX(0%);
  }
}
    
        </style>
    </body>
</html>
